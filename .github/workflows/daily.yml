name: Daily Health Advice

on:
  workflow_dispatch:  # 手動実行のみ

jobs:
  send-advice:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily advice
        env:
          POLAR_ACCESS_TOKEN: ${{ secrets.POLAR_ACCESS_TOKEN }}
          POLAR_USER_ID: ${{ secrets.POLAR_USER_ID }}
          POLAR_CLIENT_ID: ${{ secrets.POLAR_CLIENT_ID }}
          POLAR_CLIENT_SECRET: ${{ secrets.POLAR_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Keep workflow active (prevent 60-day auto-disable)
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date();
            // 毎月1日に空コミットを作成してワークフローを維持
            if (today.getDate() === 1) {
              const { data: ref } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
              });
              const { data: commit } = await github.rest.git.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: ref.object.sha,
              });
              const { data: newCommit } = await github.rest.git.createCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                message: `chore: keep workflow active (${today.toISOString().slice(0,7)})`,
                tree: commit.tree.sha,
                parents: [ref.object.sha],
              });
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/main',
                sha: newCommit.sha,
              });
              console.log('Monthly keep-alive commit created.');
            }
